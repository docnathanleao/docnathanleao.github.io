<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Restrito - R1 Psiquiatria</title>

<style>
:root {
--bg-color: #0A192F;
--card-bg: rgba(255, 255, 255, 0.05);
--card-border: rgba(255, 255, 255, 0.1);
--text-main: #f8fafc;
--text-muted: #94a3b8;
--accent: #2563eb;
--accent-hover: #1d4ed8;
--error: #ef4444;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
font-family: 'Segoe UI', system-ui, sans-serif;
background-color: var(--bg-color);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.login-container {
background: var(--card-bg);
backdrop-filter: blur(15px);
border: 1px solid var(--card-border);
padding: 40px;
border-radius: 20px;
width: 100%;
max-width: 380px;
text-align: center;
}

h2 { color: var(--text-main); margin-bottom: 10px; }
p { color: var(--text-muted); margin-bottom: 25px; }

input {
width: 100%;
padding: 12px;
border-radius: 8px;
border: 1px solid var(--card-border);
background: rgba(255,255,255,0.05);
color: white;
margin-bottom: 15px;
font-size: 16px;
}

button {
width: 100%;
padding: 12px;
border-radius: 8px;
border: none;
background: var(--accent);
color: white;
font-weight: 600;
cursor: pointer;
}

button:hover { background: var(--accent-hover); }

.error {
color: var(--error);
margin-top: 10px;
display: none;
}

#content-frame {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
border: none;
}
</style>
</head>
<body>

<div class="login-container">
<h2>Área Restrita</h2>
<p>Insira a credencial para acessar o material.</p>
<input type="password" id="password" placeholder="Digite a senha">
<button onclick="login()">Acessar</button>
<div class="error" id="error">Senha incorreta.</div>
</div>

<iframe id="content-frame"></iframe>

<script>
const HASH_CORRETO = "441bb336492ae235a9c5cc26dd1491945a9352bb418e3126edad3a859c393d80";

const URL_PROTEGIDA = "https://sinapsideo.notion.site/w6er5g4s5dth468gh9wer78w9e8r79wer4g8s?pvs=74";

async function sha256(text) {
const encoder = new TextEncoder();
const data = encoder.encode(text);
const hashBuffer = await crypto.subtle.digest("SHA-256", data);
const hashArray = Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function constantTimeCompare(a, b) {
if (a.length !== b.length) return false;
let result = 0;
for (let i = 0; i < a.length; i++) {
result |= a.charCodeAt(i) ^ b.charCodeAt(i);
}
return result === 0;
}

async function login() {
const input = document.getElementById("password").value.trim().toLowerCase();
const error = document.getElementById("error");
const frame = document.getElementById("content-frame");

if (!input) {
error.style.display = "block";
return;
}

const hash = await sha256(input);

if (constantTimeCompare(hash, HASH_CORRETO)) {
document.querySelector(".login-container").style.display = "none";
frame.src = URL_PROTEGIDA;
frame.style.display = "block";
} else {
error.style.display = "block";
}
}
</script>

</body>
</html>
