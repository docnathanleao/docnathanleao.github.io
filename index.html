<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - R1 Psiquiatria</title>
    <style>
        :root {
            /* Cores sólidas de fundo e azul moderno */
            --bg-color: #0A192F; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-wrapper {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-lock {
            width: 48px;
            height: 48px;
            fill: var(--accent);
            margin-bottom: 20px;
        }

        h2 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            width: 100%;
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: var(--error);
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            height: 20px;
        }

        .error-message.visible {
            opacity: 1;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        #content-frame {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background-color: #ffffff;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="login-wrapper" id="login-wrapper">
        <div class="login-container">
            <svg class="icon-lock" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 10v-4c0-3.313-2.687-6-6-6s-6 2.687-6 6v4h-3v14h18v-14h-3zm-10-4c0-2.206 1.794-4 4-4s4 1.794 4 4v4h-8v-4zm4 13c-1.104 0-2-.896-2-2s.896-2 2-2 2 .896 2 2-.896 2-2 2z"/>
            </svg>
            <h2>Área Restrita</h2>
            <p>Insira sua credencial para acessar o material exclusivo de Psiquiatria.</p>
            
            <div class="input-group" id="input-group">
                <input type="password" id="entry-key" placeholder="Digite a credencial" autocomplete="off">
            </div>
            <button id="auth-btn">Acessar</button>
            
            <div id="error-message" class="error-message">Acesso negado.</div>
        </div>
    </div>

    <iframe id="content-frame" allow="fullscreen"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('auth-btn');
            const inp = document.getElementById('entry-key');
            const msg = document.getElementById('error-message');
            const grp = document.getElementById('input-group');
            const loginWrapper = document.getElementById('login-wrapper');
            const iframe = document.getElementById('content-frame');

            const _0xdb = [24, 7, 29, 1, 6, 83, 78, 75, 1, 0, 15, 82, 65, 3, 26, 9, 20, 26, 71, 15, 27, 6, 0, 14, 93, 19, 3, 26, 21, 20, 74, 25, 18, 29, 3, 24, 8, 82, 77, 2, 26, 8, 25, 6, 31, 17];

            const triggerError = () => {
                msg.classList.add('visible');
                grp.classList.add('shake');
                setTimeout(() => {
                    grp.classList.remove('shake');
                    inp.value = '';
                }, 400);
            };

            const processAccess = () => {
                // Aqui está a correção: ignora espaços digitados sem querer e letras maiúsculas
                const k = inp.value.trim().toLowerCase();
                
                if (!k) {
                    triggerError();
                    return;
                }

                msg.classList.remove('visible');
                let r = '';
                
                try {
                    for (let i = 0; i < _0xdb.length; i++) {
                        r += String.fromCharCode(_0xdb[i] ^ k.charCodeAt(i % k.length));
                    }

                    if (r.startsWith('https://')) {
                        loginWrapper.style.display = 'none';
                        iframe.src = r;
                        iframe.style.display = 'block';
                    } else {
                        triggerError();
                    }
                } catch (e) {
                    triggerError();
                }
            };

            btn.addEventListener('click', processAccess);
            
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    processAccess();
                }
            });
            
            inp.addEventListener('input', () => {
                if (msg.classList.contains('visible')) {
                    msg.classList.remove('visible');
                }
            });

            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || 
                   (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                   (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
